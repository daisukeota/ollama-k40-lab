# Dokploy / local Compose for Ollama on Tesla K40 (sm_35)
#
# sapphire 例（nvidia-smi）:
#   GPU 0 = Tesla K40c   ← この Compose が専有（NVIDIA_VISIBLE_DEVICES=0）
#   GPU 1 = GeForce 2GB  ← OpenFoodFlow paddle-ocr 等に割り当て
#
# Dokploy:
#   - Compose Path: ./docker-compose.yml
#   - Build enabled (first build is long — pulls ollama37-builder then compiles sm_35)
#   - Port 11434 must be free (stop ollama-k40c-v0314 first if replacing it)
#
# Build args (optional):
#   OLLAMA37_REF=v2.2.3              # dogkeeper886/ollama37 git tag
#   OLLAMA_VERSION=2.2.3-k40         # string baked into `ollama -v`
#   CMAKE_CUDA_ARCHITECTURES=35-real # native CUBIN for K40 only

services:
  ollama-k40:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        OLLAMA37_REF: ${OLLAMA37_REF:-v2.2.3}
        OLLAMA_VERSION: ${OLLAMA_VERSION:-2.2.3-k40}
        CMAKE_CUDA_ARCHITECTURES: ${CMAKE_CUDA_ARCHITECTURES:-35-real}
    image: ollama-k40-lab:local
    container_name: ollama-k40c
    restart: unless-stopped
    # Compose v2 + nvidia-container-toolkit（k80-lab / ollama37 と同じ）
    runtime: nvidia
    ports:
      - "11434:11434"
    volumes:
      # Reuse old volume name if migrating from ollama-v0.3.14-cc35-dokploy:
      #   ollama_v0314_data:/root/.ollama
      - ollama_k40_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
      # K40 のみ。GeForce を掴むと sm_35 CUBIN と不一致で失敗/CPU 落ちする
      - NVIDIA_VISIBLE_DEVICES=${NVIDIA_VISIBLE_DEVICES:-0}
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      # 任意: 調査時のみ
      # - OLLAMA_DEBUG=1
      # - GGML_CUDA_DEBUG=1
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${OLLAMA_GPU_DEVICE_ID:-0}"]
              capabilities: [gpu]
    networks:
      - dokploy-network
    healthcheck:
      test: ["CMD", "/usr/bin/ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  ollama_k40_data:

networks:
  dokploy-network:
    external: true
